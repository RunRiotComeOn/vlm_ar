### Model Configuration
# Curriculum Phase 2: Continue from Phase 1 checkpoint
model_name_or_path: /nas03/yixuh/vlm-adaptive-resoning/LLaMA-Factory/saves/qwen2_5vl-3b/curriculum/phase1
image_max_pixels: 262144
video_max_pixels: 16384
trust_remote_code: true

### Training Method
stage: sft
do_train: true
finetuning_type: full
freeze_vision_tower: true
freeze_multi_modal_projector: true
freeze_language_model: false
deepspeed: examples/deepspeed/ds_z3_config.json

### Dataset Configuration - Curriculum Phase 2: Mixed data
# cold_start type1 (2470 samples): <answer> only
# cold_start type2 (1061 samples): <perception> + <answer>
# vlm_ar type3 formatted (3000 samples): <perception> + <reasoning> + <answer>
# Total: ~6531 samples - model learns to selectively omit tokens
dataset: vision_sr1_cold_type1,vision_sr1_cold_type2,vlm_adaptive_reasoning_type3_formatted
template: qwen2_vl
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 32
dataloader_num_workers: 8

### Output Configuration
output_dir: saves/qwen2_5vl-3b/curriculum/phase2
logging_steps: 10
save_steps: 500
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: tensorboard

### Training Hyperparameters
per_device_train_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
